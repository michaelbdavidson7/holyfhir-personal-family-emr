<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
  </head>
  <body>
    <main>
      <h1>Reset your password</h1>
      <p>Enter your username and recovery key to begin. This feature is not linked from setup yet.</p>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Continue</button>
      </form>
    </main>
  </body>
</html>
