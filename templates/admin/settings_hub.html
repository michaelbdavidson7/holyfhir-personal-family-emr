{% extends "admin/base_site.html" %}

{% block content %}
<div class="content">
  <div class="container-fluid">
    <div class="row">
      {% for card in settings_cards %}
        <div class="col-lg-4 col-md-6 col-12">
          <div class="card card-outline card-primary h-100">
            <div class="card-body">
              <div class="d-flex align-items-start">
                <div class="mr-3 text-primary" aria-hidden="true">
                  <i class="{{ card.icon }} fa-2x"></i>
                </div>
                <div>
                  <h3 class="h5 mb-2">{{ card.title }}</h3>
                  <p class="text-muted mb-3">{{ card.description }}</p>
                  <a href="{{ card.url }}" class="btn btn-primary btn-sm">
                    Open {{ card.title }}
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
