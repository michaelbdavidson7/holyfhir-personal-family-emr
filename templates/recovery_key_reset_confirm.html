<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Choose New Password</title>
  </head>
  <body>
    <main>
      <h1>Choose a new password</h1>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset password</button>
      </form>
    </main>
  </body>
</html>
